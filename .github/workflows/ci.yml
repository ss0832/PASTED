name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff==0.15.7"

      - name: ruff check
        run: ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade setuptools (PEP 639 license field support)
        run: pip install "setuptools>=75.3"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --junitxml=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: true

  typecheck:
    name: Type check (mypy)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade setuptools (PEP 639 license field support)
        run: pip install "setuptools>=75.3"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy src/

  build:
    name: Build distribution
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build "setuptools>=75.3"

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  docs:
    name: Build & deploy docs
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade setuptools (PEP 639 license field support)
        run: pip install "setuptools>=75.3"

      - name: Install package with docs extras
        run: pip install -e ".[docs]"

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/ docs/_build/html --keep-going

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4
